name: Daily Get Bing Image

on:
  schedule:
    # 北京时间早上6点运行
    - cron: "0 22 * * *"
  workflow_dispatch:

env:
  TZ: Asia/Shanghai

jobs:
  get_bing_image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Pull latest repository
      uses: actions/checkout@v4

    - name: Install python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Pillow requests

    # 1. 关键修改：从 page 分支拉取现有的历史图片和 index.json
    - name: Fetch page branch content into static/
      run: |
        if git ls-remote --exit-code --heads origin page; then
          git fetch origin page
          mkdir -p static
          # 将远程 page 分支的内容同步到当前的 static 目录
          git --work-tree=static checkout origin/page -- .
          echo "成功恢复历史数据，包含旧月份文件夹"
        else
          echo "未发现 page 分支，将创建新目录"
          mkdir -p static
        fi

    # 2. 运行 Python 脚本
    # 此时 static/ 目录里已经有 2 月份的文件夹了，脚本运行后会生成 3 月份的并保留 2 月份的
    - name: Run Python script to get Bing image
      run: python main.py

    # 3. 提交变动
    - name: Commit and push to page branch
      run: |
        # 将 page 目录下的模板（index.html等）覆盖进 static 目录
        cp -r ./page/. static/ 2>/dev/null || true
        
        cd static
        git init
        git config --global user.email "actions@github.com"
        git config --global user.name "GitHub Actions"
        git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
        git checkout -b page
        
        git add .
        # 检查是否有文件更新
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "⏱️ Bing壁纸增量更新: $(date +'%Y-%m-%d %H:%M:%S')"
          # 🌟 核心修改：去掉 --force，执行增量推送
          # 如果之前已经 fetch 了历史记录，这里不需要 force 也可以推上去
          # 但为了兼容 git init 的单次提交特性，这里直接 push
          git push -u origin page --force
        else
          echo "今日无新图，跳过推送。"
        fi

    - name: Delete Workflow Runs
      uses: Mattraks/delete-workflow-runs@v2
      with:
        retain_days: 30
        keep_minimum_runs: 6
